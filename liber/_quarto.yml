project:
  type: book
  resources:
    - Portada.png
    - Portada.pdf

bibliography: references.bib

book:
  cover-image: Portada.png
  cover-image-alt: "Portada del libro Natura Docens - Ciencias Naturales"
  title: "Natura Docens"
  bread-crumbs: false
  page-footer: "Copyright 2025, Camilo Tayac"
  downloads: [pdf, epub]
  page-navigation: true
  search: true
  repo-url: https://github.com/camilotayac/docere/
  repo-actions: [edit]
  sharing: [twitter, facebook]
  output-file: natura-docens

  sidebar:
    collapse-level: 1

  chapters:
    - part: "Generalidades"
      chapters:
        - index.qmd
        - 01_Generalidades/01_Introduccion.qmd
        - 01_Generalidades/02_PlanDeArea.qmd
    - part: "Décimo - Química"
      chapters:
        - 06_Decimo/reactivo_limite.qmd
  appendices:
    - bibliografia.qmd

  site-url: https://camilotayac.github.io/docere/
  site-path: /docere/
  language: es

format:
  pdf:
    documentclass: scrbook
    classoption: [12pt, oneside, open=any]
    include-in-header: preamble.tex
    filters:
      - _filters/color-sections.lua
      - _filters/icfes-tables.lua
    toc: true
    toc-depth: 1
    number-depth: 3
    number-sections: true
    secnumdepth: 1
    lang: es
    colorlinks: true
    linkcolor: docere-link
    citecolor: docere-cite
    urlcolor: docere-url
    highlight-style: pygments
    mermaid-format: svg

  html:
    theme: flatly
    css: _styles/headings.css
    filters:
      - _filters/icfes-tables.lua
    toc: true
    toc-depth: 3
    toc-location: right
    lang: es
    include-after-body: _scripts/collapse.html
    mermaid:
      theme: neutral


  epub:
    cover-image: Portada.png
    css: _styles/headings.css
    filters:
      - _filters/icfes-tables.lua
    toc: true
    toc-depth: 3
    number-sections: true
    math-method: webtex
    mermaid-format: png
    meta:
      dc:creator: "Camilo Tayac"
      dc:publisher: "Docere"
      dc:language: es
      dc:description: "Natura Docens - Ciencias Naturales. Libro interactivo de química para educación media."

