project:
  type: book
  resources:
    - Portada.png
    - Portada.pdf

bibliography: references.bib

book:
  cover-image: Portada.png
  title: "Natura Docens"
  bread-crumbs: false
  page-footer: "Copyright 2025, Camilo Tayac"
  downloads: [pdf,epub]
  page-navigation: true
  repo-url: https://github.com/camilotayac/docere/
  repo-actions: [edit]
  sharing: [twitter, facebook]
  
  sidebar:
    collapse-level: 1

  chapters:
    - part: "Generalidades"
      chapters:
        - index.qmd
        - 01_Generalidades/01_Introduccion.qmd
        - 01_Generalidades/02_PlanDeArea.qmd
    - part: "Sexto"
      chapters:
        - 02_Sexto/Biologia.qmd
    - part: "Séptimo"
      chapters:
        - 03_Septimo/Quimica.qmd
        - 03_Septimo/Fisica.qmd
    - part: "Octavo"
      chapters:
        - 04_Octavo/Quimica.qmd
        - 04_Octavo/Biologia.qmd
    - part: "Noveno"
      chapters:
        - 05_Noveno/Quimica.qmd
    - part: "Décimo"
      chapters:
        - 06_Decimo/Quimica.qmd
        - 06_Decimo/Biologia.qmd
    - part: "Once"
      chapters:
        - 07_Once/QUIMICA.qmd


  appendices:
    - bibliografia.qmd

  site-url: https://camilotayac.github.io/docere/
  language: es
  

format:
  pdf:
    documentclass: scrbook
    classoption: [12pt, oneside, open=any]
    include-in-header: preamble.tex
    toc: true
    toc-depth: 1
    number-depth: 1
    number-sections: true
    secnumdepth: 2
    lang: es
    colorlinks: true
    
  html:
    theme: cosmo
    css: _extensions/edu-boxes.css
    toc: true
    toc-depth: 3
    toc-location: right

  epub:
    cover-image: Portada.png   
    toc: true
    toc-depth: 3
    number-sections: true
    
theme:
  light: flatly
  dark: darkly
    
filters:
  - _extensions/edu-boxes.lua
