project:
  type: book
  resources:
    - Portada.png
    - Portada.pdf

bibliography: references.bib

book:
  cover-image: Portada.png
  cover-image-alt: "Portada del libro Natura Docens - Ciencias Naturales"
  title: "Natura Docens"
  bread-crumbs: false
  page-footer: "Copyright 2025, Camilo Tayac"
  downloads: [pdf, epub]
  page-navigation: true
  search: true
  repo-url: https://github.com/camilotayac/docere/
  repo-actions: [edit]
  sharing: [twitter, facebook]
  output-file: natura-docens

  sidebar:
    collapse-level: 1

  chapters:
    - part: "Generalidades"
      chapters:
        - index.qmd
        - 01_Generalidades/01_Introduccion.qmd
        - 01_Generalidades/02_PlanDeArea.qmd
    - part: "Décimo - Química"
      chapters:
        - 06_Decimo/reactivo_limite.qmd
        - 06_Decimo/escritura_quimica.qmd
  appendices:
    - bibliografia.qmd

  site-url: https://camilotayac.github.io/docere/
  site-path: /docere/
  language: es

format:
  pdf:
    documentclass: scrbook
    classoption: [12pt, oneside, open=any]
    include-in-header: preamble.tex
    toc: true
    toc-depth: 2
    number-depth: 2
    number-sections: true
    secnumdepth: 2
    lang: es
    colorlinks: true

  html:
    theme:
      light: flatly
      dark: darkly
    css: _extensions/edu-boxes.css
    toc: true
    toc-depth: 3
    toc-location: right
    include-after-body: _extensions/edu-boxes-after.html

  epub:
    cover-image: Portada.png
    css: _extensions/edu-boxes.css
    toc: true
    toc-depth: 3
    number-sections: true

filters:
  - _extensions/edu-boxes.lua
